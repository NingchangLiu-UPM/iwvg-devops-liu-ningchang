# ============================================================================
# Continuous Integration Workflow
# ============================================================================
# Triggered on:
#   - push to develop or release-* branches
#   - pull_request targeting develop or release-* branches
#
# Pipeline stages:
#   1. Checkout (full history for CodeQL/Sonar blame data)
#   2. Set up Java 21 (Temurin) + Maven cache
#   3. Initialize CodeQL (security-extended queries)
#   4. Run unit + integration + functional tests (via mvn verify)
#   5. Upload JaCoCo XML coverage as artifact (consumed by SonarCloud in #2)
#   6. SonarCloud quality analysis
#   7. CodeQL static analysis
#
# Out of scope:
#   - Docker image build   -> Issue #3 / CD workflow
#   - Render deployment    -> Issue #3 / CD workflow
# ============================================================================

name: CI

on:
  push:
    branches: [develop, release-*]
  pull_request:
    branches: [develop, release-*]

# Cancel any in-progress run on the same ref (saves CI minutes,
# avoids race conditions on downstream services like SonarCloud).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  devops:
    name: Tests & CodeQL
    runs-on: ubuntu-22.04

    # Minimal, explicit permissions:
    #   contents: read         -- checkout code
    #   actions: read          -- required for some action metadata APIs
    #   security-events: write -- CodeQL uploads SARIF to GitHub Security tab
    permissions:
      contents: read
      actions: read
      security-events: write

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed by CodeQL & SonarCloud blame

      - name: ☕ Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: 🏷️ Extract module name from pom
        run: echo "ARTIFACT=$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)" >> $GITHUB_ENV

      - name: 🛡️ Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java
          queries: security-extended

      - name: ✅ Run Unit, Integration & Functional Tests
        # -fae (fail-at-end): run all tests before failing, so we see EVERY failure in one run
        run: mvn -B -fae verify

      - name: 📦 Upload JaCoCo coverage report
        if: always()   # upload even on test failure, so coverage is available for diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage
          path: target/site/jacoco/jacoco.xml
          if-no-files-found: error   # fail loudly if coverage file is missing
          retention-days: 14

      - name: 📊 SonarCloud Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mvn -B sonar:sonar

      - name: 🔍 CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java"
