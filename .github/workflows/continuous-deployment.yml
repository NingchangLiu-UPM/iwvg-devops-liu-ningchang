name: CD
on:
  push:
    branches: ['master']

env:
  REPOSITORY: ${{ github.repository }} # <user>/<repo>, original case preserved for reference
  GHCR_URL: ghcr.io # GitHub Container Registry

jobs:
  cd:
    name: Build & Push GitHub Package & Deploy on Render Docker Image
    runs-on: ubuntu-22.04
    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: 🏷️ Extract artifact from pom and normalize image coordinates
        run: |
          echo "VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_ENV
          echo "ARTIFACT=$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)" >> $GITHUB_ENV
          echo "IMAGE_REPOSITORY=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "IMAGE_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # 1. Create a Personal Access Token (classic):
      #    GitHub → Settings → Developer settings → Personal access tokens → Generate new token (classic)
      #    Minimum scopes: write:packages, read:packages, delete:packages, repo
      #
      # 2. Create a secret in GitHub:
      #    Repo → Settings → Secrets and variables → Actions → New repository secret
      #    Name: GHCR_PERSONAL_ACCESS_TOKEN, Value: <your token>
      - name: 📦 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_URL }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PERSONAL_ACCESS_TOKEN }}

      - name: 🐳 Build & Push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ env.GHCR_URL }}/${{ env.IMAGE_REPOSITORY }}:${{ env.IMAGE_VERSION }}
            ${{ env.GHCR_URL }}/${{ env.IMAGE_REPOSITORY }}:latest

      # 🌐 Render Deployment
      # 1. In Render: Web Service → Settings → Deploy Hook → copy the FULL URL
      #    (e.g. https://api.render.com/deploy/srv-xxxxx?key=yyyyy)
      # 2. In GitHub: Settings → Secrets and variables → Actions → create secret RENDER_DEPLOY_HOOK_URL
      #    with the full URL as its value
      - name: 🚀 Deploy on Render
        run: |
          curl --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
          && echo "✅ Deployment succeeded" \
          || (echo "❌ Deployment failed" && exit 1)
